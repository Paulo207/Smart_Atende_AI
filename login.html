<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartAtende AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            height: 100vh;
            overflow: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .shimmer-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.1) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .shimmer-btn:hover::after {
            opacity: 1;
            left: 100%;
            top: 100%;
        }

        .input-group input:focus~label,
        .input-group input:not(:placeholder-shown)~label {
            transform: translateY(-24px) scale(0.85);
            color: #22c55e;
        }

        .input-group label {
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vibrant-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.15), transparent 70%);
            filter: blur(60px);
            z-index: -1;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            from {
                transform: translate(-20%, -20%);
            }

            to {
                transform: translate(20%, 20%);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center">
    <div class="vibrant-blob top-0 left-0"></div>
    <div class="vibrant-blob bottom-0 right-0"
        style="background: radial-gradient(circle, rgba(16, 185, 129, 0.15), transparent 70%);"></div>

    <div class="glass w-full max-w-md p-10 rounded-3xl fade-in mx-4">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-green-500/10 mb-6 border border-green-500/20">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">SmartAtende AI</h1>
            <p class="text-slate-400">Entre para acessar seu painel de controle</p>
        </div>

        <form id="login-form" class="space-y-8">
            <div class="input-group relative">
                <input type="email" id="email" required placeholder=" "
                    class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-4 text-white focus:outline-none focus:border-green-500 transition-all placeholder-transparent">
                <label for="email" class="absolute left-4 top-4 text-slate-400">E-mail</label>
            </div>

            <div class="input-group relative">
                <input type="password" id="password" required placeholder=" "
                    class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-4 text-white focus:outline-none focus:border-green-500 transition-all placeholder-transparent">
                <label for="password" class="absolute left-4 top-4 text-slate-400">Senha</label>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-slate-400 cursor-pointer group">
                    <input type="checkbox"
                        class="rounded border-slate-700 bg-slate-800 text-green-500 focus:ring-green-500/20">
                    <span class="group-hover:text-slate-300 transition-colors">Lembrar acesso</span>
                </label>
                <a href="#" class="text-green-500 hover:text-green-400 transition-colors font-medium">Esqueceu a
                    senha?</a>
            </div>

            <button type="submit" id="btn-login"
                class="shimmer-btn w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-500/20 transform hover:-translate-y-1 active:translate-y-0 transition-all flex items-center justify-center gap-2">
                <span>Acessar Painel</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </form>

        <p class="text-center mt-8 text-slate-500 text-sm">
            &copy; 2026 SmartAtende AI. Todos os direitos reservados.
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const btnLogin = document.getElementById('btn-login');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const originalBtnText = btnLogin.innerHTML;
            btnLogin.disabled = true;
            btnLogin.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Validando...`;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/';
                } else {
                    alert(data.error || 'Falha na autenticação');
                    btnLogin.innerHTML = originalBtnText;
                    btnLogin.disabled = false;
                }
            } catch (error) {
                console.error('Erro de login:', error);
                alert('Erro ao conectar com o servidor');
                btnLogin.innerHTML = originalBtnText;
                btnLogin.disabled = false;
            }
        });

        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/';
        }
    </script>
</body>

</html>
